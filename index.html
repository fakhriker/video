<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Video Intro</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:Arial, sans-serif;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
display:none;
}

#startScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

#startBtn{
padding:20px 40px;
font-size:22px;
background:white;
border:none;
border-radius:10px;
cursor:pointer;
}

</style>

</head>

<body>

<div id="startScreen">
<button id="startBtn">Klik Disini</button>
</div>

<video id="video" playsinline disablepictureinpicture controlslist="nodownload noplaybackrate">
<source src="jump.mp4" type="video/mp4">
</video>

<script>

let video = document.getElementById("video");
let startBtn = document.getElementById("startBtn");
let startScreen = document.getElementById("startScreen");

startBtn.onclick = function(){

startScreen.style.display = "none";
video.style.display = "block";

video.volume = 1;
video.muted = false;

video.play();

}

/* Paksa volume selalu 100% */
setInterval(()=>{
if(video.volume < 1){
video.volume = 1;
}
},500);

/* Jika user mencoba pause → play lagi */
video.addEventListener("pause", function(){
video.play();
});

/* Hilangkan klik kanan / menu */
document.addEventListener("contextmenu", e => e.preventDefault());

</script>

</body>
</html>
