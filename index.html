<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Video Intro</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
}

video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<video id="video" autoplay playsinline>
<source src="jump.mp4" type="video/mp4">
</video>

<script>

let video = document.getElementById("video");

function playVideo(){

video.muted = false;

let playPromise = video.play();

if(playPromise !== undefined){
playPromise.catch(()=>{
document.body.addEventListener("click", ()=>{
video.play();
});
});
}

}

window.onload = playVideo;

</script>

</body>
</html>
